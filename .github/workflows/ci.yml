name: CI

on: push

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
      NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_TOKEN }}
      NEXT_PUBLIC_SHOPIFY_API_VERSION: "2026-07"
      # PostHog/Sentry stay unset in CI: both no-op without keys, and
      # Playwright's bot UA is filtered by PostHog anyway.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: npx playwright test
